<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
<style>
    *{
        padding: 0px;
        margin: 0px;
    }
    body{
        background-color:cornsilk;
        height: 100vh;
         display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
       
    }
    div{
        width: 350px;
        height: 350px;
        background-color: #e1bf96;
       text-align: center;
       border-radius: 20px;
       padding: 20px;
        
    }
    img{
        width: 100px;
        height: 100px;
         display: block;
         margin: auto;
         margin-top: 50px;
    }
    button{
        font-size: 30px;
        background-color: #996f3c;
        border-radius: 10px;
       margin-top: 30px;
        padding: 10px;
    }
    h1{
        font-size: 40px;
        font-weight: 700;
        margin-bottom: 20px;
    }
    h2{
         font-size: 40px;
        font-weight: 900;
        margin-bottom: 20px;
    }

</style>
<body>
    <h2>WELCOME TO DICE ROLLING APP🎲</h2>
    <div>
        <h1>You Score</h1>
    <img src="dice 1.png" alt="">
    <button>Roll Dice</button>
</div>
</body>
<script>
    let headone = document.querySelector("h1")
    let image = document.querySelector("img")
    let btn = document.querySelector("button")
    btn.addEventListener("click",()=>{
        let randomnumber = (Math.ceil(Math.random()*6))
         console.log(randomnumber)
         headone.textContent = `You Score ${randomnumber}`;
         image.src = "dice " + randomnumber + ".png"
    })
</script>
</html>
